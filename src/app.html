<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jiji</title>
    <style>
      /* Pre-token fallbacks; keep in sync with --clr-bg-0 in tokens.css. */
      html {
        background: #0e0e11; /* midnight */
      }
      html[data-theme="graphite"] {
        background: #121212;
      }
      html[data-theme="abyss"] {
        background: #080d17;
      }
      html[data-theme="moss"] {
        background: #0d120e;
      }
      html[data-theme="ember"] {
        background: #131010;
      }
      html[data-theme="paper"] {
        background: #ececf1;
      }
      html[data-theme="linen"] {
        background: #ece7df;
      }
      html[data-theme="glacier"] {
        background: #e6ecf2;
      }
      html[data-theme="meadow"] {
        background: #e7ece5;
      }
      html[data-theme="dawn"] {
        background: #efe7e8;
      }
    </style>
    <script>
      // Resolve the stored theme preference before first paint so the
      // window never flashes the wrong palette. Owned afterwards by
      // $lib/state/theme.svelte.ts, which holds the canonical registry —
      // keep the id lists here in sync with it.
      (() => {
        const DARK = ["midnight", "graphite", "abyss", "moss", "ember"];
        const LIGHT = ["paper", "linen", "glacier", "meadow", "dawn"];
        let mode = "system";
        let dark = DARK[0];
        let light = LIGHT[0];
        try {
          const raw = localStorage.getItem("jiji-theme");
          if (raw && raw[0] === "{") {
            const pref = JSON.parse(raw);
            if (pref.mode === "light" || pref.mode === "dark") mode = pref.mode;
            if (DARK.includes(pref.dark)) dark = pref.dark;
            if (LIGHT.includes(pref.light)) light = pref.light;
          } else if (raw === "light" || raw === "dark") {
            mode = raw; // legacy bare-mode format
          }
        } catch {}
        // Themes are a supporter perk: an unregistered copy boots to the
        // default light palette. `jiji-registered` mirrors the cached license
        // (the full record lives in license.json) so this stays synchronous.
        let registered = false;
        try {
          registered = localStorage.getItem("jiji-registered") === "1";
        } catch {}
        const scheme =
          mode === "system"
            ? matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark"
            : mode;
        document.documentElement.dataset.theme = registered
          ? scheme === "light"
            ? light
            : dark
          : "paper";
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
